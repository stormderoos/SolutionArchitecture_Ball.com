services:
    rabbitmq:
        image: rabbitmq:3.13-management
        # Pre-create the Erlang cookie world-readable, then start RabbitMQ normally.
        # Works around the recurring ".erlang.cookie: eacces" crash on Docker Desktop,
        # where RabbitMQ could not read a root-owned mode-400 cookie file.
        entrypoint: ["/bin/sh", "-c", "echo 'ballcomsecretcookie' > /var/lib/rabbitmq/.erlang.cookie && chown rabbitmq:rabbitmq /var/lib/rabbitmq/.erlang.cookie && chmod 600 /var/lib/rabbitmq/.erlang.cookie && exec docker-entrypoint.sh rabbitmq-server"]
        ports:
            - "5672:5672"
            - "15672:15672"
        healthcheck:
            test: rabbitmq-diagnostics -q ping
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 40s

    mysql:
        image: mysql:8.0
        environment:
            MYSQL_ROOT_PASSWORD: root
        ports:
            - "3307:3306"
        volumes:
            - mysql_data:/var/lib/mysql
            - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql

    order:
        build:
            context: ./order
        environment:
            RABBITMQ_URL: amqp://rabbitmq
            DB_HOST: mysql
            DB_USER: order_app
            DB_PASS: order_app_pw
            DB_NAME: OrderServiceDB
        restart: unless-stopped
        ports:
            - "5000:5000"
        depends_on:
            rabbitmq:
                condition: service_healthy

    orderread:
        build:
            context: ./orderRead
        environment:
            RABBITMQ_URL: amqp://rabbitmq
            DB_HOST: mysql
            DB_USER: orderread_app
            DB_PASS: orderread_app_pw
            DB_NAME: OrderServiceReadDB
        volumes:
            - ./customer_data.csv:/app/customer_data.csv
        restart: unless-stopped
        ports:
            - "5010:5010"
        depends_on:
            rabbitmq:
                condition: service_healthy

    warehouse:
        build:
            context: ./warehouse
        environment:
            RABBITMQ_URL: amqp://rabbitmq
            DB_HOST: mysql
            DB_USER: warehouse_app
            DB_PASS: warehouse_app_pw
            DB_NAME: WarehouseServiceDB
        restart: unless-stopped
        ports:
            - "5100:5100"
        depends_on:
            rabbitmq:
                condition: service_healthy

    payment:
        build:
            context: ./payment
        environment:
            RABBITMQ_URL: amqp://rabbitmq
            DB_HOST: mysql
            DB_USER: payment_app
            DB_PASS: payment_app_pw
            DB_NAME: PaymentServiceDB
        restart: unless-stopped
        ports:
            - "5001:5001"
        depends_on:
            rabbitmq:
                condition: service_healthy

    catalog:
        build:
            context: ./catalog
        environment:
            RABBITMQ_URL: amqp://rabbitmq
        restart: unless-stopped
        ports:
            - "5002:5000"
        depends_on:
            rabbitmq:
                condition: service_healthy

    customer:
        build:
            context: ./customer
        environment:
            RABBITMQ_URL: amqp://rabbitmq
            DB_HOST: mysql
            DB_USER: customer_app
            DB_PASS: customer_app_pw
            DB_NAME: CustomerServiceDB
        volumes:
            - ./customer_data.csv:/app/customer_data.csv
        restart: unless-stopped
        ports:
            - "5003:5003"
        depends_on:
            rabbitmq:
                condition: service_healthy

    shipping:
        build:
            context: ./shipping
        environment:
            RABBITMQ_URL: amqp://rabbitmq
            DB_HOST: mysql
            DB_USER: shipping_app
            DB_PASS: shipping_app_pw
            DB_NAME: ShippingServiceDB
        restart: unless-stopped
        ports:
            - "5004:5004"
        depends_on:
            rabbitmq:
                condition: service_healthy

volumes:
    rabbitmq_data:
    mysql_data:
